<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Cálculo de Hipotenusa - Tarea 1</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="formulario">
	<h1>📐 Cálculo de Hipotenusa</h1>
	<p style="color:#6c757d;margin:0 0 24px 0;line-height:1.6;">Utilice el teorema de Pitágoras (c² = a² + b²) para calcular la hipotenusa de un triángulo rectángulo.</p>
	<form action="hipotenusa" method="post">
		<label>📏 Ingrese la longitud del cateto a:</label>
		<input type="number" step="any" name="a" placeholder="Ej: 3.5" required>
		<label>📏 Ingrese la longitud del cateto b:</label>
		<input type="number" step="any" name="b" placeholder="Ej: 4.5" required>
		<div style="background:#f0f4f8;border-left:4px solid #5b9eff;padding:16px;border-radius:6px;margin:20px 0;font-size:13px;">
			<strong>💡 Fórmula:</strong> c = √(a² + b²)
		</div>
		<div class="acciones">
			<button type="submit">✓ Calcular</button>
			<a class="sec" href="menu.html">← Cancelar</a>
		</div>
	</form>
</div>
</body>
</html>
