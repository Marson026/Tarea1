<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Análisis de Números - Tarea 1</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="formulario">
	<h1>🔢 Análisis de Números</h1>
	<p style="color:#6c757d;margin:0 0 24px 0;line-height:1.6;">Realice análisis avanzados de números: encuentre el mayor, menor o el número más repetido en una lista.</p>
	<form action="numeros" method="post">
		<label>📋 Seleccione la operación:</label>
		<div class="opciones">
			<label><input type="radio" name="operacion" value="mayor" checked> ⬆️ Encontrar el mayor de 3 números</label>
			<label><input type="radio" name="operacion" value="menor"> ⬇️ Encontrar el menor de 3 números</label>
			<label><input type="radio" name="operacion" value="masRepetido"> 🔁 Encontrar el valor que más se repita</label>
		</div>
		<label>🎯 Ingrese 3 números (para mayor/menor):</label>
		<div class="tres">
			<div>
				<label for="n1">n₁</label>
				<input type="number" id="n1" name="n1" placeholder="Número 1">
			</div>
			<div>
				<label for="n2">n₂</label>
				<input type="number" id="n2" name="n2" placeholder="Número 2">
			</div>
			<div>
				<label for="n3">n₃</label>
				<input type="number" id="n3" name="n3" placeholder="Número 3">
			</div>
		</div>
		<label>📝 Lista de números (para "más repetido", separe con comas o espacios):</label>
		<textarea name="numeros" rows="4" placeholder="Ej: 1, 2, 3, 2, 1, 1"></textarea>
		<div class="acciones">
			<button type="submit">✓ Calcular</button>
			<a class="sec" href="menu.html">← Cancelar</a>
		</div>
	</form>
</div>
</body>
</html>
