<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Conversión Binaria - Tarea 1</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="formulario">
	<h1>📊 Conversión Binaria</h1>
	<p style="color:#6c757d;margin:0 0 24px 0;line-height:1.6;">Convierta números entre los sistemas binario y decimal de forma instantánea y precisa.</p>
	<form action="binarios" method="post">
		<label>🔄 Seleccione la operación:</label>
		<div class="opciones">
			<label><input type="radio" name="operacion" value="binarioAdecimal" checked> Binario → Decimal</label>
			<label><input type="radio" name="operacion" value="decimalAbinario"> Decimal → Binario</label>
		</div>
		<label>🔢 Ingrese el número:</label>
		<input type="text" name="numero" placeholder="Ej: 1010 o 10" required>
		<div class="acciones">
			<button type="submit">✓ Calcular</button>
			<a class="sec" href="menu.html">← Cancelar</a>
		</div>
	</form>
</div>
</body>
</html>
